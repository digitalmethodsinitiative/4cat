<div class="daterange-wrapper">
    <input name="{{ field_name }}-min_proxy" id="forminput-{{ option }}" class="input-time" type="date"
           placeholder="dd-mm-yyyy"> to
    <input name="{{ field_name }}-max_proxy" class="input-time" type="date"
           placeholder="dd-mm-yyyy"> <span class="red"></span>
    <input name="{{ field_name }}-min" type="hidden" value="-1">
    <input name="{{ field_name }}-max" type="hidden" value="-1">
</div>
